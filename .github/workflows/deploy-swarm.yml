name: Deploy to Swarm

on:
  workflow_call:
    inputs:
      app_name:
        description: "Nome da aplicação (usado para nomear a imagem no registry)"
        required: true
        type: string
      stack_name:
        description: "Nome do stack no Docker Swarm"
        required: true
        type: string
      service_name:
        description: "Nome do service dentro do stack (sem prefixo do stack)"
        required: true
        type: string
      port:
        description: "Porta interna do container"
        required: false
        type: string
        default: "3000"
      dockerfile:
        description: "Path do Dockerfile"
        required: false
        type: string
        default: "Dockerfile"
      deploy_config:
        description: "Path do deploy-config.yml"
        required: false
        type: string
        default: "deploy-config.yml"
      dns_target:
        description: "Alvo do CNAME DNS (ex: vps.digital-ai.tech)"
        required: false
        type: string
        default: "vps.digital-ai.tech"
      notify_url:
        description: "URL do webhook n8n para notificações de deploy"
        required: false
        type: string
        default: "https://webhook.digital-ai.tech/webhook/1c708636-864f-469d-8540-0dab5c145c7c"
    secrets:
      REGISTRY_USER:
        required: true
      REGISTRY_PASSWORD:
        required: true
      CF_API_TOKEN:
        required: true
      CF_ZONE_ID:
        required: true
      APP_DATABASE_URL:
        required: false
      APP_NEXTAUTH_SECRET:
        required: false
      APP_ADMIN_EMAIL:
        required: false
      APP_ADMIN_PASSWORD:
        required: false

jobs:
  build-push:
    name: Build & Push Image
    runs-on: [self-hosted, swarm]
    outputs:
      image: ${{ steps.build.outputs.image }}
      sha_tag: ${{ steps.build.outputs.sha_tag }}
    steps:
      - name: Notify — Deploy Iniciado
        env:
          COMMIT_MSG: ${{ github.event.head_commit.message }}
          ACTOR: ${{ github.actor }}
          BRANCH: ${{ github.ref_name }}
          SHA: ${{ github.sha }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          N8N_URL: ${{ inputs.notify_url }}
          REPO: ${{ inputs.app_name }}
        run: |
          curl -sf -X POST "${N8N_URL}" \
            -H "Content-Type: application/json" \
            -d "$(python3 -c "import json,os; print(json.dumps({
              'status':'started','repo':os.environ['REPO'],
              'branch':os.environ['BRANCH'],'actor':os.environ['ACTOR'],
              'commit_sha':os.environ['SHA'],'commit_message':os.environ['COMMIT_MSG'],
              'run_url':os.environ['RUN_URL']
            }))")" || true

      - name: Checkout
        uses: actions/checkout@v4

      - name: Login no Registry
        run: |
          echo "${{ secrets.REGISTRY_PASSWORD }}" | \
          docker login registry.digital-ai.tech \
          -u "${{ secrets.REGISTRY_USER }}" --password-stdin

      - name: Build & Push
        id: build
        run: |
          IMAGE="registry.digital-ai.tech/digital-ai/${{ inputs.app_name }}"
          SHA_TAG="${{ github.sha }}"
          docker build -f "${{ inputs.dockerfile }}" \
            -t "${IMAGE}:latest" \
            -t "${IMAGE}:${SHA_TAG}" .
          docker push "${IMAGE}:latest"
          docker push "${IMAGE}:${SHA_TAG}"
          echo "image=${IMAGE}" >> $GITHUB_OUTPUT
          echo "sha_tag=${SHA_TAG}" >> $GITHUB_OUTPUT

      - name: Notify — Build Concluido
        if: success()
        env:
          BRANCH: ${{ github.ref_name }}
          ACTOR: ${{ github.actor }}
          SHA: ${{ github.sha }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          N8N_URL: ${{ inputs.notify_url }}
          REPO: ${{ inputs.app_name }}
        run: |
          curl -sf -X POST "${N8N_URL}" \
            -H "Content-Type: application/json" \
            -d "$(python3 -c "import json,os; print(json.dumps({
              'status':'info','stage':'Build & Push',
              'message':'Imagem publicada no registry com sucesso',
              'repo':os.environ['REPO'],'branch':os.environ['BRANCH'],
              'actor':os.environ['ACTOR'],'commit_sha':os.environ['SHA'],
              'run_url':os.environ['RUN_URL']
            }))")" || true

      - name: Notify — Build Falhou
        if: failure()
        env:
          COMMIT_MSG: ${{ github.event.head_commit.message }}
          BRANCH: ${{ github.ref_name }}
          ACTOR: ${{ github.actor }}
          SHA: ${{ github.sha }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          N8N_URL: ${{ inputs.notify_url }}
          REPO: ${{ inputs.app_name }}
        run: |
          curl -sf -X POST "${N8N_URL}" \
            -H "Content-Type: application/json" \
            -d "$(python3 -c "import json,os; print(json.dumps({
              'status':'failure','stage':'Build & Push',
              'message':'Falha no build ou push da imagem Docker.',
              'repo':os.environ['REPO'],'branch':os.environ['BRANCH'],
              'actor':os.environ['ACTOR'],'commit_sha':os.environ['SHA'],
              'commit_message':os.environ['COMMIT_MSG'],
              'run_url':os.environ['RUN_URL']
            }))")" || true

  dns-sync:
    name: Sync DNS (Cloudflare)
    needs: [build-push]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Sync CNAME Records no Cloudflare
        env:
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CF_ZONE_ID: ${{ secrets.CF_ZONE_ID }}
          DNS_TARGET: ${{ inputs.dns_target }}
        run: |
          DOMAINS=$(python3 -c "
          import yaml
          with open('${{ inputs.deploy_config }}') as f:
              cfg = yaml.safe_load(f)
          for d in cfg.get('domains', []):
              print(d)
          ")

          if [ -z "$DOMAINS" ]; then
            echo "Nenhum domínio encontrado em ${{ inputs.deploy_config }}, pulando DNS sync."
            exit 0
          fi

          for DOMAIN in $DOMAINS; do
            echo "--- Sincronizando CNAME: $DOMAIN → $DNS_TARGET ---"

            EXISTING=$(curl -s \
              "https://api.cloudflare.com/client/v4/zones/${CF_ZONE_ID}/dns_records?type=CNAME&name=${DOMAIN}" \
              -H "Authorization: Bearer ${CF_API_TOKEN}" \
              -H "Content-Type: application/json")

            RECORD_ID=$(echo "$EXISTING" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['result'][0]['id'] if d.get('result') else '')" 2>/dev/null || echo "")
            CURRENT_TARGET=$(echo "$EXISTING" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['result'][0]['content'] if d.get('result') else '')" 2>/dev/null || echo "")

            if [ -n "$RECORD_ID" ] && [ "$CURRENT_TARGET" = "$DNS_TARGET" ]; then
              echo "  -> Já correto (CNAME → $DNS_TARGET)"
            elif [ -n "$RECORD_ID" ]; then
              curl -s -X PATCH \
                "https://api.cloudflare.com/client/v4/zones/${CF_ZONE_ID}/dns_records/${RECORD_ID}" \
                -H "Authorization: Bearer ${CF_API_TOKEN}" \
                -H "Content-Type: application/json" \
                -d "{\"content\":\"${DNS_TARGET}\",\"proxied\":false,\"ttl\":1}" > /dev/null
              echo "  -> Atualizado: CNAME → $DNS_TARGET (DNS Only)"
            else
              curl -s -X POST \
                "https://api.cloudflare.com/client/v4/zones/${CF_ZONE_ID}/dns_records" \
                -H "Authorization: Bearer ${CF_API_TOKEN}" \
                -H "Content-Type: application/json" \
                -d "{\"type\":\"CNAME\",\"name\":\"${DOMAIN}\",\"content\":\"${DNS_TARGET}\",\"ttl\":1,\"proxied\":false}" > /dev/null
              echo "  -> Criado: $DOMAIN CNAME → $DNS_TARGET (DNS Only)"
            fi
          done

          echo "DNS sync concluído. Aguardando propagação (15s)..."
          sleep 15

      - name: Notify — DNS Sincronizado
        if: success()
        env:
          BRANCH: ${{ github.ref_name }}
          ACTOR: ${{ github.actor }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          N8N_URL: ${{ inputs.notify_url }}
          REPO: ${{ inputs.app_name }}
        run: |
          curl -sf -X POST "${N8N_URL}" \
            -H "Content-Type: application/json" \
            -d "$(python3 -c "import json,os; print(json.dumps({
              'status':'info','stage':'DNS Sync',
              'message':'CNAME sincronizado na Cloudflare com sucesso',
              'repo':os.environ['REPO'],'branch':os.environ['BRANCH'],
              'actor':os.environ['ACTOR'],'run_url':os.environ['RUN_URL']
            }))")" || true

      - name: Notify — DNS Falhou
        if: failure()
        env:
          BRANCH: ${{ github.ref_name }}
          ACTOR: ${{ github.actor }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          N8N_URL: ${{ inputs.notify_url }}
          REPO: ${{ inputs.app_name }}
        run: |
          curl -sf -X POST "${N8N_URL}" \
            -H "Content-Type: application/json" \
            -d "$(python3 -c "import json,os; print(json.dumps({
              'status':'failure','stage':'DNS Sync',
              'message':'Falha ao sincronizar CNAME na Cloudflare.',
              'repo':os.environ['REPO'],'branch':os.environ['BRANCH'],
              'actor':os.environ['ACTOR'],'run_url':os.environ['RUN_URL']
            }))")" || true

  deploy:
    name: Deploy no Swarm
    needs: [build-push, dns-sync]
    runs-on: [self-hosted, swarm]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login no Registry
        run: |
          echo "${{ secrets.REGISTRY_PASSWORD }}" | \
          docker login registry.digital-ai.tech \
          -u "${{ secrets.REGISTRY_USER }}" --password-stdin

      - name: Deploy Stack
        id: deploy
        env:
          IMAGE: registry.digital-ai.tech/digital-ai/${{ inputs.app_name }}
          SHA_TAG: ${{ needs.build-push.outputs.sha_tag }}
          STACK: ${{ inputs.stack_name }}
          SERVICE: ${{ inputs.stack_name }}_${{ inputs.service_name }}
          APP_DATABASE_URL: ${{ secrets.APP_DATABASE_URL }}
          APP_NEXTAUTH_SECRET: ${{ secrets.APP_NEXTAUTH_SECRET }}
          APP_ADMIN_EMAIL: ${{ secrets.APP_ADMIN_EMAIL }}
          APP_ADMIN_PASSWORD: ${{ secrets.APP_ADMIN_PASSWORD }}
        run: |
          # Export app env vars from secrets (if provided)
          [ -n "${APP_DATABASE_URL:-}" ] && export DATABASE_URL="${APP_DATABASE_URL}"
          [ -n "${APP_NEXTAUTH_SECRET:-}" ] && export NEXTAUTH_SECRET="${APP_NEXTAUTH_SECRET}"
          [ -n "${APP_ADMIN_EMAIL:-}" ] && export ADMIN_EMAIL="${APP_ADMIN_EMAIL}"
          [ -n "${APP_ADMIN_PASSWORD:-}" ] && export ADMIN_PASSWORD="${APP_ADMIN_PASSWORD}"
          # Set image tag for docker-stack.yml substitution
          export IMAGE_TAG="${SHA_TAG}"
          echo "Deploying stack ${STACK} with image ${IMAGE}:${SHA_TAG}..."
          docker stack deploy \
            --with-registry-auth \
            --prune \
            -c docker-stack.yml \
            "${STACK}"

      - name: Health Check
        env:
          SERVICE: ${{ inputs.stack_name }}_${{ inputs.service_name }}
        run: |
          MAX_WAIT=120
          ELAPSED=0
          while [ $ELAPSED -lt $MAX_WAIT ]; do
            STATE=$(docker service ps "${SERVICE}" \
              --filter "desired-state=running" \
              --format "{{.CurrentState}}" | head -1)
            echo "  Estado: $STATE (${ELAPSED}s)"
            if [[ "$STATE" == Running* ]]; then
              echo "Deploy OK — $(date)"
              exit 0
            fi
            sleep 5
            ELAPSED=$((ELAPSED + 5))
          done
          echo "Timeout — verificando logs..."
          docker service logs "${SERVICE}" --tail 50
          exit 1

      - name: Notify — Deploy Concluido com Sucesso
        if: success()
        env:
          COMMIT_MSG: ${{ github.event.head_commit.message }}
          BRANCH: ${{ github.ref_name }}
          ACTOR: ${{ github.actor }}
          SHA: ${{ github.sha }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          N8N_URL: ${{ inputs.notify_url }}
          REPO: ${{ inputs.app_name }}
        run: |
          curl -sf -X POST "${N8N_URL}" \
            -H "Content-Type: application/json" \
            -d "$(python3 -c "import json,os; print(json.dumps({
              'status':'success','repo':os.environ['REPO'],
              'branch':os.environ['BRANCH'],'actor':os.environ['ACTOR'],
              'commit_sha':os.environ['SHA'],'commit_message':os.environ['COMMIT_MSG'],
              'run_url':os.environ['RUN_URL'],
              'message':os.environ['REPO']+'.digital-ai.tech atualizado e saudavel'
            }))")" || true

      - name: Notify — Deploy Falhou
        if: failure()
        env:
          COMMIT_MSG: ${{ github.event.head_commit.message }}
          BRANCH: ${{ github.ref_name }}
          ACTOR: ${{ github.actor }}
          SHA: ${{ github.sha }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          N8N_URL: ${{ inputs.notify_url }}
          REPO: ${{ inputs.app_name }}
        run: |
          curl -sf -X POST "${N8N_URL}" \
            -H "Content-Type: application/json" \
            -d "$(python3 -c "import json,os; print(json.dumps({
              'status':'failure','stage':'Deploy',
              'message':'Falha no deploy do Swarm ou health check.',
              'repo':os.environ['REPO'],'branch':os.environ['BRANCH'],
              'actor':os.environ['ACTOR'],'commit_sha':os.environ['SHA'],
              'commit_message':os.environ['COMMIT_MSG'],
              'run_url':os.environ['RUN_URL']
            }))")" || true



